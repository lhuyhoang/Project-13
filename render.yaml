services:
 - type: web
 name: blogviet-api
 runtime: node
 rootDir: backend
 plan: free
 buildCommand: npm install
 startCommand: npm start
 healthCheckPath: /api/health
 autoDeploy: true
 envVars:
 - key: NODE_ENV
 value: production
 - key: MONGO_URI
 sync: false
 - key: JWT_SECRET
 generateValue: true
 - key: CLIENT_URL
 value: https://blogviet.vercel.app
 - key: ADMIN_EMAIL
 value: admin@blogviet.vn
 - key: ADMIN_PASSWORD
 value: admin123
 - key: ADMIN_USERNAME
 value: admin
 - key: CLOUDINARY_CLOUD_NAME
 sync: false
 - key: CLOUDINARY_API_KEY
 sync: false
 - key: CLOUDINARY_API_SECRET
 sync: false
