 <!-- Theme bootstrap: apply dark class trước khi CSS load để tránh flash -->
 <script>
 (function () {
 try {
 var raw = localStorage.getItem('theme-storage');
 var theme = 'light';
 if (raw) {
 var parsed = JSON.parse(raw);
 if (parsed && parsed.state && parsed.state.theme === 'dark') {
 theme = 'dark';
 }
 }
 if (theme === 'dark') {
 document.documentElement.classList.add('dark');
 }
 } catch (e) {
 /* ignore */
 }
 })();
 </script>
